name: OSX-14
on:
  push:
    branches:
    - main
jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Qt 6
      run: |
          brew update
          brew install qt@6
    - name: Set Qt Environment
      run: |
          echo "QT_PREFIX=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"
    - name: Compile
      run: |
        make -f Makefile
    - name: Create tarball
      run: |
        tar -cvf myapp.tgz myapp
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: Artifact
        path: |
          .
